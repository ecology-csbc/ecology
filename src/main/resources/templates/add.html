<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Додати запис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Додати новий екологічний запис</h1>
    <form th:action="@{/add}" th:object="${ecology}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">ПІБ еколога</label>
            <input type="text" class="form-control" th:field="*{ecologistName}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">ID Датчика</label>
            <input type="text" class="form-control" th:field="*{sensorId}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Дата вимірювання</label>
            <input type="date" class="form-control" th:field="*{measurementDate}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">PM2.5 (мкг/м³)</label>
            <input type="number" class="form-control" step="0.1" th:field="*{paramPm25}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">NO2 (мкг/м³)</label>
            <input type="number" class="form-control" step="0.1" th:field="*{paramNo2}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">pH</label>
            <input type="number" class="form-control" step="0.1" th:field="*{paramPh}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Рівень небезпеки</label>
            <select class="form-control" th:field="*{dangerLevel}">
                <option value="">Оберіть рівень</option>
                <option value="Низький">Низький</option>
                <option value="Середній">Середній</option>
                <option value="Високий">Високий</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Широта (Lat)</label>
            <input type="number" class="form-control" step="0.0001" th:field="*{latitude}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Довгота (Lon)</label>
            <input type="number" class="form-control" step="0.0001" th:field="*{longitude}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Назва органу влади</label>
            <input type="text" class="form-control" th:field="*{authorityName}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Адреса органу влади</label>
            <input type="text" class="form-control" th:field="*{authorityAddress}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Телефон органу влади</label>
            <input type="text" class="form-control" th:field="*{authorityPhone}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Стаж еколога (років)</label>
            <input type="number" class="form-control" th:field="*{ecologistExperience}"/>
        </div>
        <button type="submit" class="btn btn-success">Додати</button>
        <a th:href="@{/}" class="btn btn-secondary ms-2">Повернутись до записів</a>
    </form>
</body>
</html>
