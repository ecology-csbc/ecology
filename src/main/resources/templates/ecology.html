<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Екологічні записи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Екологічні записи</h1>
    <a th:href="@{/add}" class="btn btn-success mb-3">Додати запис</a>
    <table class="table table-striped table-bordered">
        <thead class="table-primary">
            <tr>
                <th>Ім'я студента</th>
                <th>Прізвище студента</th>
                <th>Ім'я викладача</th>
                <th>Прізвище викладача</th>
                <th>Назва курсу</th>
                <th>Кафедра</th>
                <th>Номер аудиторії</th>
                <th>Семестр</th>
                <th>Рік</th>
                <th>Початок заняття</th>
                <th>Закінчення заняття</th>
                <th>Дія</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ecology : ${ecologies}">
                <td th:text="${ecology.studentFirstName}"></td>
                <td th:text="${ecology.studentLastName}"></td>
                <td th:text="${ecology.teacherFirstName}"></td>
                <td th:text="${ecology.teacherLastName}"></td>
                <td th:text="${ecology.courseName}"></td>
                <td th:text="${ecology.departmentName}"></td>
                <td th:text="${ecology.roomNumber}"></td>
                <td th:text="${ecology.semester}"></td>
                <td th:text="${ecology.year}"></td>
                <td th:text="${ecology.startTime}"></td>
                <td th:text="${ecology.endTime}"></td>
                <td>
                    <form th:action="@{/delete/{id}(id=${ecology.id})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">Видалити</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
